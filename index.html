<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Modernized AI</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
      background: #0a0a0a;
      color: #f4f4f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    h1 { font-size: clamp(2rem, 6vw, 3.5rem); margin: 0 0 1rem; letter-spacing: -0.02em; }
    p { color: #a1a1aa; max-width: 32rem; line-height: 1.6; margin: 0 0 2rem; }
    button {
      background: #7c3aed; color: #fff; border: 0; padding: 0.85rem 1.75rem;
      border-radius: 0.5rem; font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #6d28d9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { margin-top: 1.5rem; font-size: 0.875rem; color: #71717a; min-height: 1.25rem; }
  </style>
</head>
<body>
  <h1>Modernized AI</h1>
  <p>Sign in to continue.</p>
  <button id="signin">Sign in with GitHub</button>
  <div id="status"></div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://cnwxxlruuuqisjezsgje.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_9I9IqX9bKKHMfQdjklZAdg_DpTbdPyM';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const btn = document.getElementById('signin');
    const status = document.getElementById('status');

    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      btn.textContent = 'Sign out';
      status.textContent = `Signed in as ${session.user.email}`;
      btn.onclick = async () => {
        await supabase.auth.signOut();
        location.reload();
      };
    } else {
      btn.onclick = async () => {
        btn.disabled = true;
        const { error } = await supabase.auth.signInWithOAuth({
          provider: 'github',
          options: { redirectTo: `${location.origin}/auth/callback/` },
        });
        if (error) {
          status.textContent = `Error: ${error.message}`;
          btn.disabled = false;
        }
      };
    }
  </script>
</body>
</html>
