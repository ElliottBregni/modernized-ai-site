<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Signing in… — Modernized AI</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
      background: #0a0a0a;
      color: #f4f4f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .spinner {
      width: 2.5rem; height: 2.5rem;
      border: 3px solid #27272a; border-top-color: #7c3aed;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-bottom: 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #a1a1aa; margin: 0; }
    .error { color: #f87171; }
  </style>
</head>
<body>
  <div class="spinner" id="spinner"></div>
  <p id="message">Completing sign in…</p>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://cnwxxlruuuqisjezsgje.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_9I9IqX9bKKHMfQdjklZAdg_DpTbdPyM';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const message = document.getElementById('message');
    const spinner = document.getElementById('spinner');

    function fail(text) {
      spinner.style.display = 'none';
      message.textContent = text;
      message.classList.add('error');
    }

    try {
      const { data, error } = await supabase.auth.getSession();
      if (error) { fail(`Sign-in failed: ${error.message}`); }
      else if (data.session) {
        message.textContent = 'Signed in. Redirecting…';
        setTimeout(() => { location.href = '/'; }, 600);
      } else {
        setTimeout(async () => {
          const { data: retry } = await supabase.auth.getSession();
          if (retry.session) location.href = '/';
          else fail('Sign-in timed out. Try again.');
        }, 1500);
      }
    } catch (e) {
      fail(`Unexpected error: ${e.message}`);
    }
  </script>
</body>
</html>
