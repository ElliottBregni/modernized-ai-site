<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Signed in — Modernized AI</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
      background: #0a0a0a;
      color: #f4f4f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 0.75rem;
      padding: 2.5rem 3rem;
      max-width: 28rem;
    }
    .check {
      width: 3rem; height: 3rem; margin: 0 auto 1.25rem;
      border-radius: 50%; background: #16a34a;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; color: #fff;
    }
    h1 { font-size: 1.25rem; margin: 0 0 0.5rem; letter-spacing: -0.01em; }
    p { color: #a1a1aa; margin: 0; font-size: 0.9rem; line-height: 1.55; }
    code { font-family: ui-monospace, monospace; color: #d4d4d8; background: #27272a; padding: 0 0.3rem; border-radius: 0.25rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">&check;</div>
    <h1>Signed in</h1>
    <p>Return to your terminal — your CLI session is ready. You can close this tab.</p>
  </div>
</body>
</html>
